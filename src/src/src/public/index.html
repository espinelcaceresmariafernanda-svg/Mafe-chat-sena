<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="/css/main.css">
    <title>Chat Javascript FullStack </title>

</head>
<body>

    <nav class="navbar navbar-light" style="background-color: #C28AE3;">
    <a class="navbar-brand mx-auto" href="/">JavaScript FullStack Chat</a>
    </nav>

    <div class="card col-md-4 mt-5 mx-auto" id="nickWrap">
        <div class="card-header">
            <h3>Ingrese su nombre de usuario:</h3>
        </div>
        <p id="nickError"></p>
        <div class="card-body">
            <form id="nickForm">
                <input type="text" id="nickname" class="form-control ">
                <button type="submit" class="btn btn-block mt-2" style="background-color: #C28AE3;" border: none;">
                    <i class="fa-solid fa-location-arrow"></i>Enviar
                </button>
            </form>
        </div>
    </div>


    <div class="container" id="contentWrap">
        <div class="row mt-2"> <div class="col-md-6 offset-md-1 mx-auto"> <div class="card">
                    <div class="card-header">   
                        <h4>Estamos Chateando</h4> 
                    </div>

                    <div id="chat" class="card-body" style="height: 300px; overflow-y: auto;"></div>

                    <form id="message-form" class="card-footer">
                        <div class="input-group"> <input type="text" id="message" class="form-control" placeholder="Escribe tu mensaje...">
                            <button type="submit" class="btn " style="background-color: #C28AE3; border: none;"><i class="fa-solid fa-location-arrow" ></i>Enviar</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="card col-md-3">
                <div class="card-header">
                    <h3>Usuarios</h3>
                </div>

                <div class="card-body">
                    <div id="usernames"></div>
                </div>
            </div>
        </div>
    </div>

  

    <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    


    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
